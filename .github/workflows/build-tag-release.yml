name: Build, Tag & Release

on:
  push:
    branches:
      - master
    paths:
      - 'sources/**'
      - 'assets/**'
      - 'webpack.common.js'
      - 'webpack.dev.js'
      - 'webpack.prod.js'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.js'
      - '.babelrc.json'
      - 'index.html'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v3.7.0 — leave blank to auto-compute)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Attempt to compute an auto tag
      - name: Bump version & create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine effective tag
        id: version
        run: |
          # If version input was provided manually, use it
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "Using manual version input: ${{ github.event.inputs.version }}"
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Fall back to auto-computed tag (if any)
            AUTO="${{ steps.tag.outputs.new_tag }}"
            if [ "$AUTO" != "" ]; then
              echo "Using automatic inferred tag: $AUTO"
              echo "tag=${AUTO}" >> $GITHUB_OUTPUT
            else
              # Fallback if no auto tag exists
              DEFAULT="v0.1.0"
              echo "No auto tag — using default: $DEFAULT"
              echo "tag=${DEFAULT}" >> $GITHUB_OUTPUT
            fi
          fi
          
      - name: Validate version format
        id: semver
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ steps.version.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install deps
        run: npm ci

      - name: Build with Webpack
        run: npm run build

      - name: Package build output
        run: zip -r sbplus-${{ steps.version.outputs.tag }}.zip dist/

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            sbplus-${{ steps.version.outputs.tag }}.zip \
            --title "sbplus-${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}